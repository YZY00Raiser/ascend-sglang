name: Single Test (NPU)
# test round 1: prefill-only tests - gte_embedding, pooled_hidden_states, score_engine

on:
  pull_request:
    branches:
      - testcases
    paths:
      - ".github/workflows/single-test-npu.yml"
  workflow_dispatch:
    inputs:
      test_case:
        description: 'Test case file path (relative to test/registered/)'
        required: false
        type: string
        default: ''
      image_a3:
        description: 'The a3 running docker image of the test task.'
        required: false
        type: string
        default: ''

env:
  TEST_CASE_1: "ascend/basic_function/prefill_only/test_npu_gte_embedding.py"
  TEST_CASE_2: "ascend/basic_function/prefill_only/test_npu_pooled_hidden_states.py"
  TEST_CASE_3: "ascend/basic_function/prefill_only/test_npu_score_engine.py"

jobs:
  set-image-config:
    runs-on: ubuntu-latest
    outputs:
      image_a3: ${{ steps.set-vars.outputs.image_a3 }}
    steps:
      - name: Set image config
        id: set-vars
        run: |
          if [ -z "${{ inputs.image_a3 }}" ]; then
            echo "image_a3=swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:main-cann8.5.0-a3" >> $GITHUB_OUTPUT
          else
            echo "image_a3=${{ inputs.image_a3 }}" >> $GITHUB_OUTPUT
          fi

  single-node-poc:
    needs: [set-image-config]
    runs-on: linux-aarch64-a3-2
    container:
      image: ${{ needs.set-image-config.outputs.image_a3 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        env:
          TORCH_CACHE_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu"
          PYPI_CACHE_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple"
          UV_INDEX_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple"
          GITHUB_PROXY_URL: "https://gh-proxy.test.osinfra.cn/"
        run: |
          # speed up by using infra cache services
          CACHING_URL="cache-service.nginx-pypi-cache.svc.cluster.local"
          sed -Ei "s@(ports|archive).ubuntu.com@${CACHING_URL}:8081@g" /etc/apt/sources.list
          pip config set global.index-url http://${CACHING_URL}/pypi/simple
          pip config set global.trusted-host "${CACHING_URL}"

          sglang_source_path=$(pwd)
          echo "Source code path: ${sglang_source_path}"

          bash scripts/ci/npu/npu_ci_install_dependency.sh a3

          # copy required file from our daily cache
          cp ~/.cache/modelscope/hub/datasets/otavia/ShareGPT_Vicuna_unfiltered/ShareGPT_V3_unfiltered_cleaned_split.json /tmp
          cp ~/.cache/modelscope/hub/datasets/tmp/test.jsonl /tmp

      - name: Print Log Information
        run: bash scripts/ci/npu/npu_log_print.sh

      - name: Run prefill-only tests
        timeout-minutes: 120
        env:
          SGLANG_USE_MODELSCOPE: true
          SGLANG_IS_IN_CI: true
          HF_ENDPOINT: https://hf-mirror.com
          TORCH_EXTENSIONS_DIR: /tmp/torch_extensions
          PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
          STREAMS_PER_DEVICE: 32
          TRANSFORMERS_VERBOSITY: "error"
        run: |
          cd test/registered
          python3 -m pytest ${TEST_CASE_1} -v --timeout=600 2>&1 | tee /tmp/test_gte_embedding.log
          python3 -m pytest ${TEST_CASE_2} -v --timeout=600 2>&1 | tee /tmp/test_pooled_hidden_states.log
          python3 -m pytest ${TEST_CASE_3} -v --timeout=600 2>&1 | tee /tmp/test_score_engine.log
